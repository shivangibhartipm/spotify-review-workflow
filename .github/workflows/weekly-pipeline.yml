name: Weekly pipeline refresh

on:
  schedule:
    # Every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline phases 1–4
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_all.py

      - name: Print pipeline summary
        run: python scripts/pipeline_summary.py

      - name: Commit updated database and exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reviews.db
          if [ -f data/exports/insights.csv ]; then
            git add data/exports/insights.csv
          fi
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): weekly pipeline refresh"
            git push
          fi
